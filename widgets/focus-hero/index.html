<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FOCUS Practice</title>

  <!-- Opportunistic rich-embed metadata (so Heartbeat's resolver may render this in a lesson hero) -->
  <meta property="og:type" content="video.other" />
  <meta property="og:title" content="The FOCUS Practice" />
  <meta property="og:description" content="A looping music + write-timer (and guided-voice) panel for the FOCUS Practice." />
  <meta property="og:image" content="https://klossgott.github.io/infocusapp/widgets/focus-hero/assets/slides/find.png" />
  <meta name="twitter:card" content="player" />
  <meta name="twitter:title" content="The FOCUS Practice" />
  <meta name="twitter:player" content="https://klossgott.github.io/infocusapp/widgets/focus-hero/" />
  <meta name="twitter:player:width" content="1280" />
  <meta name="twitter:player:height" content="720" />
  <meta name="twitter:image" content="https://klossgott.github.io/infocusapp/widgets/focus-hero/assets/slides/find.png" />

  <style>
    :root{
      --ink:#1E1A16; --cream:#F7F3EA; --scarlet:#FF2400;
      --ring-track:rgba(247,243,234,.28);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background:var(--cream); color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
      overflow:hidden;
    }
    .stage{position:fixed;inset:0;background:var(--cream)}
    .backdrop{position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;object-position:center;user-select:none;-webkit-user-drag:none}
    .scrim{position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(135% 100% at 0% 100%, rgba(30,26,22,.64) 0%, rgba(30,26,22,.32) 30%, rgba(30,26,22,0) 58%)}

    .tag{position:absolute;top:0;left:0;padding:clamp(10px,2.2vw,22px);
      font-size:clamp(10px,1.4vw,12px);letter-spacing:.18em;text-transform:uppercase;
      color:var(--ink);opacity:.45;font-weight:700}
    .credit-mark{position:absolute;top:0;right:0;padding:clamp(10px,2.2vw,22px);
      font-size:clamp(9px,1.2vw,11px);letter-spacing:.03em;
      color:var(--ink);opacity:.3;font-weight:600}

    .controls{position:absolute;left:0;bottom:0;color:var(--cream);
      padding:clamp(14px,3vw,30px)}
    .row{display:flex;align-items:center;gap:clamp(10px,1.6vw,18px);flex-wrap:wrap}

    /* play button + ring */
    .dial{position:relative;width:clamp(56px,9vw,84px);aspect-ratio:1;flex:0 0 auto}
    .dial svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
    .ring-track{fill:none;stroke:var(--ring-track);stroke-width:6}
    .ring{fill:none;stroke:var(--scarlet);stroke-width:6;stroke-linecap:round;
      stroke-dasharray:283;stroke-dashoffset:0;transition:stroke-dashoffset .35s linear}
    .play{position:absolute;inset:9%;border:0;border-radius:50%;cursor:pointer;
      background:rgba(30,26,22,.78);color:var(--cream);
      display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s}
    .play:hover{background:rgba(30,26,22,.92)}
    .play:active{transform:scale(.95)}
    .play svg{width:42%;height:42%;display:block;fill:currentColor;transform:none;position:static}

    .meta{display:flex;flex-direction:column;gap:2px;max-width:min(42vw,340px)}
    .title{font-size:clamp(12px,1.7vw,15px);font-weight:600;line-height:1.25;
      text-shadow:0 1px 3px rgba(0,0,0,.45)}
    .credit{font-size:clamp(10px,1.4vw,12px);opacity:.82;line-height:1.2;
      text-shadow:0 1px 3px rgba(0,0,0,.45)}

    .loop{flex:0 0 auto;border:0;background:transparent;cursor:pointer;
      color:var(--cream);opacity:.6;width:clamp(26px,4vw,34px);aspect-ratio:1;border-radius:8px;
      display:flex;align-items:center;justify-content:center;transition:opacity .15s,background .15s}
    .loop svg{width:70%;height:70%;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .loop:hover{opacity:.9;background:rgba(247,243,234,.12)}
    .loop.on{opacity:1;color:var(--scarlet)}

    /* timings cluster — countdown + duration presets, to the right of the loop button */
    .timings{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
    .time{font-variant-numeric:tabular-nums;font-weight:700;
      font-size:clamp(15px,2.4vw,20px);letter-spacing:.02em;line-height:1.1}
    .durations{display:flex;gap:6px;flex-wrap:wrap}
    .dur{border:1px solid rgba(247,243,234,.38);background:rgba(30,26,22,.5);
      color:var(--cream);font:inherit;font-weight:600;font-size:clamp(10px,1.3vw,12px);
      padding:3px 10px;border-radius:999px;cursor:pointer;line-height:1.4;
      transition:background .15s,border-color .15s,opacity .15s;opacity:.85}
    .dur:hover{opacity:1;border-color:var(--scarlet)}
    .dur.active{background:var(--scarlet);border-color:var(--scarlet);color:#fff;opacity:1}

    /* Remember mode: keep the countdown, but no presets and no loop */
    body.remember .durations,
    body.remember .loop{display:none}
  </style>
</head>
<body>
  <div class="stage">
    <img class="backdrop" alt="" />
    <div class="scrim"></div>
    <div class="tag" id="tag"></div>
    <div class="credit-mark">© Kai Lossgott</div>

    <div class="controls">
      <div class="row">
        <div class="dial">
          <svg viewBox="0 0 100 100" aria-hidden="true">
            <circle class="ring-track" cx="50" cy="50" r="45"></circle>
            <circle class="ring" id="ring" cx="50" cy="50" r="45"></circle>
          </svg>
          <button class="play" id="play" aria-label="Play">
            <svg id="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
          </button>
        </div>

        <div class="meta">
          <div class="title" id="title"></div>
          <div class="credit" id="credit"></div>
        </div>

        <button class="loop on" id="loop" aria-label="Loop music" title="Loop music">
          <svg viewBox="0 0 24 24"><path d="M17 2l4 4-4 4"></path><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><path d="M7 22l-4-4 4-4"></path><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
        </button>

        <div class="timings">
          <div class="time" id="time">0:00</div>
          <div class="durations" id="durations"></div>
        </div>
      </div>
    </div>
  </div>

  <audio id="audio" preload="metadata"></audio>

  <script>
    // ---- Per-stage data (display title + credit = the "lost names" fix) ----
    const STAGES = {
      find:    {music:"find.mp3",    title:"Gymnopédie No. 1 — Erik Satie (arr. harp)",          credit:"Public domain · Musopen"},
      orient:  {music:"orient.mp3",  title:"Cumbia Colombiana",                                  credit:"Royalty-free · Pixabay"},
      clarify: {music:"clarify.mp3", title:"Rio at Night",                                       credit:"Royalty-free · Pixabay"},
      unfold:  {music:"unfold.mp3",  title:"Happy Journey",                                      credit:"Royalty-free · Pixabay"},
      steer:   {music:"steer.mp3",   title:"Cello Suite No. 1, Prelude (BWV 1007) — J.S. Bach",  credit:"Public domain · Musopen"}
    };
    const DURATION_OPTIONS = [1, 5, 10, 15, 20];
    const MODE_DEFAULT = { write:10, move:1 };
    const RING = 283;
    const FADE_SECONDS = 6;

    const VALID_MODES = ["write", "move", "remember"];
    const params = new URLSearchParams(location.search);
    const stage = STAGES[(params.get("stage")||"find").toLowerCase()] ? (params.get("stage")||"find").toLowerCase() : "find";
    const mode  = VALID_MODES.includes((params.get("mode")||"write").toLowerCase()) ? (params.get("mode")||"write").toLowerCase() : "write";
    const data  = STAGES[stage];
    const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
    const isRemember = (mode === "remember");

    const audio  = document.getElementById("audio");
    const ring   = document.getElementById("ring");
    const timeEl = document.getElementById("time");
    const playBtn= document.getElementById("play");
    const icon   = document.getElementById("icon");
    const loopBtn= document.getElementById("loop");
    const durBox = document.getElementById("durations");

    const ICON_PLAY  = "M8 5v14l11-7z";
    const ICON_PAUSE = "M6 5h4v14H6zM14 5h4v14h-4z";
    const setIcon = d => icon.querySelector("path").setAttribute("d", d);
    const fmt = t => `${Math.floor(t/60)}:${String(Math.max(0,Math.round(t)%60)).padStart(2,"0")}`;

    // ---- Wire up slide, audio, title + credit per mode ----
    let slideFile, audioSrc, titleText, creditText;
    if (isRemember){
      document.body.classList.add("remember");
      slideFile  = stage + "-remember.png";
      audioSrc   = "assets/voice/" + stage + ".mp3";
      titleText  = "Guided practice — " + cap(stage);
      creditText = "by Kai";
    } else {
      slideFile  = (mode === "move") ? (stage + "-move.png") : (stage + ".png");
      audioSrc   = "assets/music/" + data.music;
      titleText  = data.title;
      creditText = data.credit;
    }
    document.querySelector(".backdrop").src = "assets/slides/" + slideFile;
    audio.src = audioSrc;
    audio.loop = !isRemember;
    document.getElementById("title").textContent  = titleText;
    document.getElementById("credit").textContent = creditText;
    document.getElementById("tag").textContent = stage + " · " + mode;
    document.title = "FOCUS · " + cap(stage) + " — " + cap(mode);

    // =========================================================
    // REMEMBER — guided voice; ring = progress arc, time = countdown remaining
    // =========================================================
    if (isRemember){
      ring.style.strokeDashoffset = RING;
      const paintVoice = () => {
        const dur = audio.duration || 0;
        const left = Math.max(0, dur - audio.currentTime);
        timeEl.textContent = fmt(left);
        ring.style.strokeDashoffset = (RING * (1 - (dur ? audio.currentTime/dur : 0))).toFixed(1);
      };
      audio.addEventListener("loadedmetadata", paintVoice);
      audio.addEventListener("timeupdate", paintVoice);
      audio.addEventListener("ended", () => { setIcon(ICON_PLAY); ring.style.strokeDashoffset = RING; paintVoice(); });
      playBtn.addEventListener("click", () => {
        if (audio.paused){ audio.play().catch(()=>{}); setIcon(ICON_PAUSE); playBtn.setAttribute("aria-label","Pause"); }
        else { audio.pause(); setIcon(ICON_PLAY); playBtn.setAttribute("aria-label","Play"); }
      });
      timeEl.textContent = "0:00";

    // =========================================================
    // TIMER MODES (write / move) — countdown + looping music + fade-out
    // =========================================================
    } else {
      let TIME_LIMIT = MODE_DEFAULT[mode] * 60;
      let timeLeft = TIME_LIMIT, interval = null, fadeTimer = null, running = false;
      const paint = () => {
        timeEl.textContent = fmt(timeLeft);
        ring.style.strokeDashoffset = (RING * (1 - timeLeft / TIME_LIMIT)).toFixed(1);
      };

      DURATION_OPTIONS.forEach(min => {
        const b = document.createElement("button");
        b.className = "dur"; b.dataset.min = min; b.textContent = String(min);
        if (min === MODE_DEFAULT[mode]) b.classList.add("active");
        b.addEventListener("click", () => {
          TIME_LIMIT = min * 60;
          durBox.querySelectorAll(".dur").forEach(x => x.classList.toggle("active", +x.dataset.min === min));
          hardStop(); timeLeft = TIME_LIMIT; paint(); start();
        });
        durBox.appendChild(b);
      });

      function start(){
        running = true; setIcon(ICON_PAUSE); playBtn.setAttribute("aria-label","Pause");
        clearInterval(fadeTimer); audio.volume = 1; audio.play().catch(()=>{});
        interval = setInterval(tick, 1000);
      }
      function pause(){
        running = false; setIcon(ICON_PLAY); playBtn.setAttribute("aria-label","Play");
        audio.pause(); clearInterval(interval); clearInterval(fadeTimer);
      }
      function hardStop(){
        running = false; setIcon(ICON_PLAY);
        clearInterval(interval); clearInterval(fadeTimer); audio.pause(); audio.volume = 1;
      }
      function tick(){
        timeLeft -= 1; paint();
        if (timeLeft <= FADE_SECONDS && audio.volume > 0.05)
          audio.volume = Math.max(0, audio.volume - (1 / (FADE_SECONDS + 1)));
        if (timeLeft <= 0) finish();
      }
      function finish(){
        clearInterval(interval); clearInterval(fadeTimer); audio.pause();
        running = false; setIcon(ICON_PLAY); timeLeft = TIME_LIMIT; audio.volume = 1; paint();
      }

      playBtn.addEventListener("click", () => running ? pause() : start());
      loopBtn.addEventListener("click", () => { audio.loop = !audio.loop; loopBtn.classList.toggle("on", audio.loop); });
      paint();
    }
  </script>
</body>
</html>
